<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع من Google Drive — easyT</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  :root {
    --brand: #de2422;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1f1f1f;
    --text: #fff;
    --muted: #b3b3b3;
    --border: #2a2a2a;
    --ok: #16a34a;
    --warn: #f59e0b;
    --err: #dc2626;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:Tahoma,Cairo,Arial,sans-serif; min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:18px; margin:0; color:var(--brand); }
  .layout { display:grid; grid-template-columns:280px 1fr; gap:0; min-height:calc(100vh - 56px); }
  aside { background:var(--surface); border-inline-end:1px solid var(--border); padding:16px; overflow-y:auto; }
  aside h2 { font-size:13px; color:var(--muted); margin:0 0 8px; text-transform:uppercase; letter-spacing:0.5px; }
  aside .empty { color:var(--muted); font-size:12px; padding:16px 8px; text-align:center; border:1px dashed var(--border); border-radius:6px; }
  .incomplete-item { background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:.15s; }
  .incomplete-item:hover { border-color:var(--brand); }
  .incomplete-item .name { font-weight:600; font-size:13px; }
  .incomplete-item .meta { font-size:11px; color:var(--muted); margin-top:4px; }
  .incomplete-item .pill { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; margin-inline-end:4px; }
  .pill-pending { background:rgba(245,158,11,0.15); color:var(--warn); }
  .pill-failed { background:rgba(220,38,38,0.15); color:var(--err); }
  main { padding:20px 24px; overflow-y:auto; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
  .card h3 { margin:0 0 12px; font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
  label { display:block; font-size:13px; color:var(--muted); margin-bottom:4px; }
  input, select { width:100%; padding:8px 10px; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:5px; font-size:13px; font-family:inherit; }
  input:focus, select:focus { outline:none; border-color:var(--brand); }
  button { background:var(--brand); color:#fff; border:0; padding:8px 16px; border-radius:5px; cursor:pointer; font-weight:600; font-size:13px; transition:.15s; }
  button:hover:not(:disabled) { background:#b81c1a; }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
  button.ghost:hover { border-color:var(--brand); }
  .row { display:flex; gap:8px; align-items:center; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .tree { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px; max-height:55vh; overflow-y:auto; }
  .node { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:4px; }
  .node:hover { background:var(--surface-2); }
  .node .order-input { width:48px; padding:3px 6px; font-size:12px; text-align:center; }
  .node .icon { width:18px; height:18px; flex-shrink:0; opacity:0.7; }
  .node .name { flex:1; font-size:13px; word-break:break-all; }
  .node .size { font-size:11px; color:var(--muted); flex-shrink:0; }
  .node.folder > .name { font-weight:600; }
  .node-children { padding-inline-start:22px; border-inline-start:1px dashed var(--border); margin-inline-start:8px; }
  .node-toggle { background:none; border:none; color:var(--muted); cursor:pointer; padding:2px 4px; font-size:11px; }
  .progress-bar { background:var(--surface-2); border-radius:4px; overflow:hidden; height:8px; }
  .progress-fill { background:var(--brand); height:100%; transition:width 0.3s; }
  .log { background:#000; border-radius:5px; padding:10px; font-family:monospace; font-size:11px; max-height:200px; overflow-y:auto; color:#0f0; }
  .log .ok { color:#0f0; }
  .log .err { color:#f55; }
  .toolbar-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .signin-state { font-size:12px; color:var(--muted); }
  .signin-state.ok { color:var(--ok); }
  .resume-banner { background:rgba(245,158,11,0.1); border:1px solid var(--warn); color:var(--warn); padding:10px 14px; border-radius:6px; margin-bottom:12px; font-size:13px; }
  .pending-list { display:flex; flex-direction:column; gap:6px; }
  .pending-row { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--surface-2); border:1px solid var(--border); border-radius:5px; }
  .pending-row .pos { width:30px; color:var(--muted); font-size:12px; text-align:center; }
  .pending-row .name { flex:1; font-size:13px; }
  .pending-row .err-text { font-size:11px; color:var(--err); margin-top:2px; }
  hr { border:0; border-top:1px solid var(--border); margin:16px 0; }
  .combo-list { position:absolute; inset-inline-start:0; inset-inline-end:0; top:100%; margin-top:2px; background:var(--surface-2); border:1px solid var(--border); border-radius:5px; max-height:280px; overflow-y:auto; z-index:50; box-shadow:0 6px 24px rgba(0,0,0,0.6); }
  .combo-item { padding:8px 10px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--border); }
  .combo-item:last-child { border-bottom:0; }
  .combo-item:hover, .combo-item.active { background:var(--brand); color:#fff; }
  .combo-empty { padding:14px; text-align:center; color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>رفع من Google Drive → Bunny</h1>
  <div class="row">
    <span id="signin-state" class="signin-state">غير مسجل</span>
    <button id="signin-btn" class="ghost">سجّل دخول</button>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>كورسات ناقصة</h2>
    <div id="incomplete-list" class="empty">لا يوجد</div>
  </aside>

  <main>
    <div id="main-view">
      <!-- Empty state — shown until the user picks a course from sidebar -->
      <div id="empty-state" class="card" style="text-align:center; padding:48px 16px;">
        <div style="font-size:48px; margin-bottom:12px;">←</div>
        <div style="font-size:15px; color:var(--muted);">اضغط على كورس من القائمة اليمين لتبدأ الرفع</div>
      </div>

      <div id="course-view" style="display:none;">
        <!-- Mini header: current course + meta -->
        <div class="card" style="padding:12px 16px;">
          <div style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px;">الكورس الحالى</div>
          <div id="current-course-name" style="font-size:15px; font-weight:bold; margin-top:2px;">—</div>
          <div id="current-course-meta" style="font-size:11px; color:var(--muted); margin-top:4px;">—</div>
        </div>

        <!-- Combobox: pick a root folder from My Drive -->
        <div class="card">
          <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:6px;">اختر مجلد رئيسى من Google Drive</label>
          <select id="root-folder-select" style="width:100%;">
            <option value="">— اختر مجلد —</option>
          </select>
        </div>

        <!-- Subfolders panel (appears when a root has subfolders) -->
        <div id="subfolders-card" class="card" style="display:none;">
          <h3>المجلدات الفرعية — رتّب أولوية المطابقة</h3>
          <div id="subfolders-list" class="pending-list"></div>
        </div>

        <!-- Matching table -->
        <div id="matching-card" class="card" style="display:none;">
          <h3>المطابقة بين دروس الكورس وفيديوهات Drive</h3>
          <div id="matching-summary" style="font-size:12px; color:var(--muted); margin-bottom:10px;">—</div>
          <div id="matching-table"></div>
        </div>

        <!-- Start upload -->
        <div id="start-card" class="card" style="display:none;">
          <div class="toolbar-row">
            <button id="start-btn" disabled>ابدأ الرفع</button>
            <span id="start-help" class="signin-state">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress (shared) -->
    <div id="progress-card" class="card" style="display:none;">
      <h3>التقدم</h3>
      <div id="progress-summary" style="font-size:14px; margin-bottom:8px;">—</div>
      <div class="progress-bar"><div id="progress-overall" class="progress-fill" style="width:0%"></div></div>
      <div style="margin-top:6px; font-size:12px; color:var(--muted);" id="progress-current">—</div>
      <div class="progress-bar" style="margin-top:4px; height:4px;"><div id="progress-current-fill" class="progress-fill" style="width:0%; background:#16a34a;"></div></div>
      <div id="log" class="log" style="margin-top:12px;"></div>
    </div>
  </main>
</div>

<script>
/* ════════════════════════════════════════════════
   Config priority:
     1. URL hash params (for dev override)        /migrate#cid=...
     2. Server-injected window.__DRIVE_CONFIG__   (from env)
   ════════════════════════════════════════════════ */
const HASH = new URLSearchParams(location.hash.replace(/^#/, ""));
const SRV  = (window.__DRIVE_CONFIG__ || {});
const GOOGLE_CLIENT_ID  = HASH.get("cid")    || SRV.clientId || "";
const GOOGLE_API_KEY    = HASH.get("apikey") || SRV.apiKey   || "";
const GOOGLE_APP_ID     = HASH.get("appid")  || SRV.appId    || "";

const SCOPES = "https://www.googleapis.com/auth/drive.readonly";

const api = {
  fetch: async (url, opts = {}) => {
    const r = await fetch(url, {
      ...opts,
      headers: {
        ...(opts.headers || {}),
        ...(opts.body ? { "Content-Type": "application/json" } : {}),
      },
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.success === false) throw new Error(j.error || ("HTTP " + r.status));
    return j;
  },
};

let driveAccessToken = null;
let gisInited = false;
let tokenClient = null;

/* ════ Google sign-in (GIS) — token comes back via popup callback ════ */
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { alert("OAuth: " + resp.error); return; }
      driveAccessToken = resp.access_token;
      document.getElementById("signin-state").textContent = "مسجّل ✓";
      document.getElementById("signin-state").classList.add("ok");
      // If a course is already selected, load Drive root folders now.
      if (currentCourseId) loadRootFolders();
    },
  });
  gisInited = true;
}
window.addEventListener("load", () => {
  const wait = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2 && !gisInited) {
      gisLoaded();
      clearInterval(wait);
    }
  }, 200);
});

document.getElementById("signin-btn").addEventListener("click", () => {
  if (!GOOGLE_CLIENT_ID) {
    alert("GOOGLE_CLIENT_ID غير مضبوط فى env السيرفر.");
    return;
  }
  if (!gisInited) { alert("Google sign-in lib لسه بتحمل…"); return; }
  tokenClient.requestAccessToken({ prompt: "" });
});

/* ════════════════════════════════════════════════
   Sidebar-driven flow:
     1. User picks a course from the right sidebar.
     2. Combobox of My Drive root folders appears.
     3. User picks a root folder → server scans it (one level).
     4. Auto-matched videos go into a 2-column table:
          [اسم الدرس فى الكورس]  ←→  [الفيديو على Drive]
     5. Subfolders inside the root appear below with reorder controls.
        Reordering re-runs the match across [root + ordered subfolders].
   ════════════════════════════════════════════════ */
let currentCourseId = null;
let currentCourseName = null;
let missingLectures = [];     // [{ id, name, position }]
let rootFolderId = null;
let rootFolderName = null;
let scannedFolders = [];      // [{ id, name, isRoot, order, videos: [...], subfolders: [...] }]
let matches = [];             // [{ lectureId, lectureName, position, videoId, videoName, fromFolder }]

/* ----- Sidebar click ----- */
async function selectCourseFromSidebar(courseId, courseName) {
  currentCourseId = courseId;
  currentCourseName = courseName;
  rootFolderId = null;
  rootFolderName = null;
  scannedFolders = [];
  matches = [];

  document.getElementById("empty-state").style.display = "none";
  document.getElementById("course-view").style.display = "block";
  document.getElementById("current-course-name").textContent = courseName;
  document.getElementById("current-course-meta").textContent = "جارى تحميل دروس الكورس…";
  document.getElementById("subfolders-card").style.display = "none";
  document.getElementById("matching-card").style.display = "none";
  document.getElementById("start-card").style.display = "none";

  try {
    const j = await api.fetch(`/api/migrate/incomplete/${courseId}`);
    missingLectures = j.lectures || [];
    document.getElementById("current-course-meta").textContent =
      `${missingLectures.length} درس بدون فيديو`;
  } catch (e) {
    missingLectures = [];
    document.getElementById("current-course-meta").textContent = "خطأ: " + e.message;
    return;
  }

  if (driveAccessToken) await loadRootFolders();
  else {
    const sel = document.getElementById("root-folder-select");
    sel.innerHTML = '<option value="">سجّل دخول جوجل الأول</option>';
  }
}

/* ----- Combobox: My Drive root folders ----- */
async function loadRootFolders() {
  const sel = document.getElementById("root-folder-select");
  sel.innerHTML = '<option value="">جارى التحميل…</option>';
  try {
    // Empty query → searchFolders returns folders directly under "root".
    const j = await api.fetch("/api/migrate/drive/search", {
      method: "POST",
      body: JSON.stringify({ query: "", accessToken: driveAccessToken }),
    });
    const folders = j.folders || [];
    sel.innerHTML = '<option value="">— اختر مجلد —</option>';
    for (const f of folders) {
      const opt = document.createElement("option");
      opt.value = f.id;
      opt.textContent = f.name;
      opt.dataset.name = f.name;
      sel.appendChild(opt);
    }
  } catch (e) {
    sel.innerHTML = `<option value="">خطأ: ${e.message}</option>`;
  }
}
document.getElementById("root-folder-select").addEventListener("change", async (e) => {
  const opt = e.target.selectedOptions[0];
  if (!opt || !opt.value) return;
  await pickRootFolder(opt.value, opt.dataset.name || opt.textContent);
});

/* ----- Scan a single Drive folder (one level only) ----- */
async function scanFolder(folderId) {
  const j = await api.fetch("/api/migrate/drive/list", {
    method: "POST",
    body: JSON.stringify({ folderId, accessToken: driveAccessToken }),
  });
  return { videos: j.videos || [], subfolders: j.subfolders || [] };
}

async function pickRootFolder(folderId, folderName) {
  rootFolderId = folderId;
  rootFolderName = folderName;
  // Reset scanned set with the root folder as the first scan target.
  scannedFolders = [{
    id: folderId,
    name: folderName,
    isRoot: true,
    order: 0,
    videos: [],
    subfolders: [],
  }];
  await refreshScan(scannedFolders[0]);
  rebuildMatches();
  renderAll();
}

async function refreshScan(folder) {
  try {
    const r = await scanFolder(folder.id);
    folder.videos = r.videos;
    folder.subfolders = r.subfolders;
  } catch (e) {
    folder.error = e.message;
  }
}

/* ----- Matching: walk scanned folders in priority order, fill lecture slots ----- */
function normalizeName(s) {
  return String(s || "")
    .toLowerCase()
    .replace(/\.[a-z0-9]+$/i, "")
    .replace(/[ً-ْ]/g, "")
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[^\p{L}\p{N}]+/gu, " ")
    .trim();
}
function similarityScore(a, b) {
  const na = normalizeName(a);
  const nb = normalizeName(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1000;
  if (nb.includes(na) || na.includes(nb)) return Math.min(na.length, nb.length);
  const ta = new Set(na.split(" "));
  const tb = new Set(nb.split(" "));
  let overlap = 0;
  for (const t of ta) if (tb.has(t) && t.length >= 2) overlap += t.length;
  return overlap;
}

function rebuildMatches() {
  // Visit folders by order (root=0, then user-ordered subfolders ascending).
  const ordered = [...scannedFolders].sort((a, b) => a.order - b.order);
  const used = new Set();
  matches = missingLectures.map((lec) => ({
    lectureId: lec.id,
    lectureName: lec.name,
    position: lec.position,
    videoId: null,
    videoName: null,
    fromFolder: null,
  }));
  for (const folder of ordered) {
    for (const m of matches) {
      if (m.videoId) continue;
      let best = null, bestScore = 0;
      for (const v of folder.videos) {
        if (used.has(v.id)) continue;
        const s = similarityScore(m.lectureName, v.name);
        if (s > bestScore) { bestScore = s; best = v; }
      }
      if (best && bestScore > 0) {
        m.videoId = best.id;
        m.videoName = best.name;
        m.fromFolder = folder.name;
        used.add(best.id);
      }
    }
  }
}

/* ----- Render: meta + subfolders list + matching table + start button ----- */
function renderAll() {
  // Subfolders panel — show only the root's direct subfolders. The user
  // promotes one to "scanned" by clicking + (it goes into scannedFolders
  // with the next available order number). They can re-order in the list
  // using ▲▼ buttons; reordering re-runs matching.
  const root = scannedFolders.find((f) => f.isRoot);
  const card = document.getElementById("subfolders-card");
  const list = document.getElementById("subfolders-list");

  if (!root || (root.subfolders.length === 0 && scannedFolders.length === 1)) {
    card.style.display = "none";
  } else {
    card.style.display = "block";
    const enrolled = scannedFolders.filter((f) => !f.isRoot)
      .sort((a, b) => a.order - b.order);
    const enrolledIds = new Set(enrolled.map((f) => f.id));
    const available = root.subfolders.filter((f) => !enrolledIds.has(f.id));

    list.innerHTML = `
      ${enrolled.length > 0 ? `<div style="font-size:12px; color:var(--muted); margin-bottom:6px;">قيد المطابقة (بالترتيب):</div>` : ""}
      ${enrolled.map((f, i) => `
        <div class="pending-row" data-id="${f.id}">
          <span class="pos">${i + 1}</span>
          <div style="flex:1; font-size:13px;">📁 ${f.name}${f.error ? ` <span style="color:var(--err); font-size:11px;">${f.error}</span>` : ""}</div>
          <button data-act="up" data-id="${f.id}" class="ghost" style="padding:2px 8px; font-size:12px;">▲</button>
          <button data-act="down" data-id="${f.id}" class="ghost" style="padding:2px 8px; font-size:12px;">▼</button>
          <button data-act="remove" data-id="${f.id}" class="ghost" style="padding:2px 8px; font-size:12px; color:var(--err);">✕</button>
        </div>
      `).join("")}
      ${available.length > 0 ? `<div style="font-size:12px; color:var(--muted); margin:10px 0 6px;">إضافة (اضغط +):</div>` : ""}
      ${available.map((f) => `
        <div class="pending-row" data-id="${f.id}">
          <span class="pos">+</span>
          <div style="flex:1; font-size:13px;">📁 ${f.name}</div>
          <button data-act="add" data-id="${f.id}" data-name="${(f.name || "").replace(/"/g, "&quot;")}" class="ghost" style="padding:2px 10px; font-size:12px; color:var(--ok);">إضافة</button>
        </div>
      `).join("")}
    `;
    list.querySelectorAll("button[data-act]").forEach((btn) => {
      btn.addEventListener("click", () => onSubfolderAction(btn.dataset.act, btn.dataset.id, btn.dataset.name));
    });
  }

  // Matching table
  const matchCard = document.getElementById("matching-card");
  const summary = document.getElementById("matching-summary");
  const table = document.getElementById("matching-table");

  if (!rootFolderId) {
    matchCard.style.display = "none";
    document.getElementById("start-card").style.display = "none";
    return;
  }
  matchCard.style.display = "block";
  const matched = matches.filter((m) => m.videoId).length;
  summary.innerHTML = `${matched}/${matches.length} درس متطابق ${matched < matches.length ? `<span style="color:var(--warn);">— ${matches.length - matched} باقى</span>` : `<span style="color:var(--ok);">✓ مكتمل</span>`}`;

  table.innerHTML = `
    <table style="width:100%; border-collapse:collapse; font-size:13px;">
      <thead>
        <tr style="background:var(--surface-2); color:var(--muted); text-align:start;">
          <th style="padding:8px; width:36px;">#</th>
          <th style="padding:8px;">اسم الدرس (كما هو فى الكورس)</th>
          <th style="padding:8px; width:30px; text-align:center;">←→</th>
          <th style="padding:8px;">اسم الملف فى Drive</th>
        </tr>
      </thead>
      <tbody>
        ${matches.map((m, i) => `
          <tr style="border-top:1px solid var(--border);">
            <td style="padding:8px; color:var(--muted);">${m.position || (i + 1)}</td>
            <td style="padding:8px;">${m.lectureName}</td>
            <td style="padding:8px; text-align:center; color:${m.videoId ? "var(--ok)" : "var(--err)"};">${m.videoId ? "✓" : "✗"}</td>
            <td style="padding:8px;">
              ${m.videoId
                ? `${m.videoName}${m.fromFolder !== rootFolderName ? ` <span style="font-size:10px; color:var(--muted); margin-inline-start:6px;">(فى: ${m.fromFolder})</span>` : ""}`
                : `<span style="color:var(--muted);">— لم يتم المطابقة —</span>`}
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  // Start card
  const startCard = document.getElementById("start-card");
  const startBtn = document.getElementById("start-btn");
  const startHelp = document.getElementById("start-help");
  startCard.style.display = "block";
  if (!driveAccessToken) {
    startBtn.disabled = true;
    startHelp.textContent = "سجّل دخول جوجل الأول";
  } else if (matched === 0) {
    startBtn.disabled = true;
    startHelp.textContent = "ولا درس واحد متطابق لسه";
  } else {
    startBtn.disabled = false;
    startHelp.textContent = `جاهز — هيتم رفع ${matched} فيديو`;
  }
}

async function onSubfolderAction(act, id, name) {
  const idx = scannedFolders.findIndex((f) => f.id === id);
  const root = scannedFolders.find((f) => f.isRoot);

  if (act === "add") {
    const nextOrder = Math.max(0, ...scannedFolders.map((f) => f.order)) + 1;
    const folder = { id, name, isRoot: false, order: nextOrder, videos: [], subfolders: [] };
    scannedFolders.push(folder);
    renderAll();
    await refreshScan(folder);
    rebuildMatches();
    renderAll();
    return;
  }
  if (act === "remove") {
    if (idx >= 0) scannedFolders.splice(idx, 1);
    rebuildMatches();
    renderAll();
    return;
  }
  if (act === "up" || act === "down") {
    // Reorder among non-root folders by swapping adjacent orders.
    const enrolled = scannedFolders.filter((f) => !f.isRoot)
      .sort((a, b) => a.order - b.order);
    const i = enrolled.findIndex((f) => f.id === id);
    if (i < 0) return;
    const j = act === "up" ? i - 1 : i + 1;
    if (j < 0 || j >= enrolled.length) return;
    [enrolled[i].order, enrolled[j].order] = [enrolled[j].order, enrolled[i].order];
    rebuildMatches();
    renderAll();
  }
}

/* ----- Start upload — fills bunny_video_id on existing lectures ----- */
document.getElementById("start-btn").addEventListener("click", async () => {
  const ready = matches.filter((m) => m.videoId);
  if (ready.length === 0) return;
  if (!confirm(`سيتم رفع ${ready.length} فيديو ومطابقتهم بالدروس. متأكد؟`)) return;
  const j = await api.fetch("/api/migrate/match-and-upload", {
    method: "POST",
    body: JSON.stringify({
      courseId: currentCourseId,
      driveToken: driveAccessToken,
      pairs: ready.map((m) => ({ lectureId: m.lectureId, driveFileId: m.videoId })),
    }),
  });
  startPolling(j.jobId);
});

/* ════ Progress polling ════ */
let pollTimer = null;
function startPolling(jobId) {
  document.getElementById("progress-card").style.display = "block";
  document.getElementById("log").innerHTML = "";
  appendLog("بدأ الـ job " + jobId);
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => poll(jobId), 1500);
  poll(jobId);
}
async function poll(jobId) {
  try {
    const { job } = await api.fetch(`/api/migrate/jobs/${jobId}`);
    const pct = job.total > 0 ? Math.round(((job.completed + job.failed) / job.total) * 100) : 0;
    document.getElementById("progress-overall").style.width = pct + "%";
    document.getElementById("progress-summary").innerHTML =
      `${job.completed}/${job.total} مكتمل • <span style="color:var(--err)">${job.failed} فشل</span> • <span style="color:var(--muted)">${job.status}</span>`;
    if (job.currentTitle) {
      const cpct = job.currentTotal > 0 ? Math.round((job.currentSent / job.currentTotal) * 100) : 0;
      document.getElementById("progress-current").textContent =
        `جارى رفع: ${job.currentTitle} — ${fmtBytes(job.currentSent)} / ${fmtBytes(job.currentTotal)} (${cpct}%)`;
      document.getElementById("progress-current-fill").style.width = cpct + "%";
    } else {
      document.getElementById("progress-current").textContent = "—";
      document.getElementById("progress-current-fill").style.width = "0%";
    }
    if (job.status === "completed" || job.status === "completed_with_errors" || job.status === "failed") {
      clearInterval(pollTimer); pollTimer = null;
      appendLog(`انتهى — ${job.completed} ناجح، ${job.failed} فشل`, job.failed > 0 ? "err" : "ok");
      loadIncomplete();
    }
  } catch (e) {
    appendLog("polling error: " + e.message, "err");
    clearInterval(pollTimer); pollTimer = null;
  }
}
function appendLog(msg, cls) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

/* ════ Incomplete sidebar ════ */
async function loadIncomplete() {
  const list = document.getElementById("incomplete-list");
  try {
    const j = await api.fetch("/api/migrate/incomplete");
    if (!j.courses || j.courses.length === 0) {
      list.className = "empty";
      list.textContent = "لا يوجد";
      return;
    }
    list.className = "";
    list.innerHTML = "";
    for (const c of j.courses) {
      const item = document.createElement("div");
      item.className = "incomplete-item";
      item.innerHTML = `
        <div class="name">${c.name}</div>
        <div class="meta">
          ${c.failed > 0 ? `<span class="pill pill-failed">${c.failed} فشل</span>` : ""}
          ${c.pending > 0 ? `<span class="pill pill-pending">${c.pending} قيد الانتظار</span>` : ""}
        </div>`;
      item.addEventListener("click", () => selectCourseFromSidebar(c.courseId, c.name));
      list.appendChild(item);
    }
  } catch (e) {
    list.textContent = "خطأ: " + e.message;
  }
}

/* ════ Boot ════ */
loadIncomplete();
setInterval(loadIncomplete, 30000);
