<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 easyT - رفع دروس الكورسات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #fff; margin: 20px 0; font-size: 24px; }
        h1 span { color: #e63946; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .card { background: #1a1a2e; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #2a2a4a; }
        .card h2 { color: #e63946; margin-bottom: 16px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .card h2 .num { background: #e63946; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #ccc; font-size: 13px; }
        select, input[type="number"], input[type="text"] { width: 100%; padding: 12px 16px; border: 2px solid #2a2a4a; border-radius: 10px; font-size: 14px; background: #0d0d20; color: #fff; margin-bottom: 12px; outline: none; transition: border-color 0.3s; }
        select:focus, input:focus { border-color: #e63946; }
        select option { background: #1a1a2e; color: #fff; }
        button { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #e63946, #c62828); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(230,57,70,0.4); }
        .btn-primary:disabled { background: #333; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-danger { background: linear-gradient(135deg, #ff5252, #d32f2f); color: #fff; }
        .btn-danger:hover { transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; }
        .btn-outline { background: transparent; border: 2px solid #e63946; color: #e63946; }
        .btn-outline:hover { background: #e63946; color: #fff; }
        .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
        .stat-badge { background: #0d0d20; padding: 8px 16px; border-radius: 8px; font-size: 13px; border: 1px solid #2a2a4a; }
        .stat-badge b { color: #e63946; }
        .lessons-list { margin: 16px 0; }
        .lesson-item { background: #0d0d20; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; margin: 8px 0; }
        .lesson-item .lesson-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lesson-item .lesson-name { font-weight: 600; color: #fff; font-size: 14px; }
        .lesson-item .lesson-status { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
        .status-pending { background: #ff980020; color: #ff9800; }
        .status-processing { background: #2196f320; color: #2196f3; }
        .status-done { background: #4caf5020; color: #4caf50; }
        .status-error { background: #f4433620; color: #f44336; }
        .lesson-item textarea { width: 100%; min-height: 120px; padding: 10px; border: 1px solid #2a2a4a; border-radius: 8px; background: #12122a; color: #ccc; font-family: monospace; font-size: 12px; resize: vertical; margin-top: 8px; }
        .lesson-item .lesson-info { font-size: 12px; color: #888; margin-top: 4px; }
        .remove-btn { background: none; border: none; color: #f44336; cursor: pointer; font-size: 18px; padding: 4px 8px; }
        .remove-btn:hover { color: #ff5252; }
        .add-lesson-btn { width: 100%; padding: 14px; border: 2px dashed #2a2a4a; border-radius: 10px; background: transparent; color: #888; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .add-lesson-btn:hover { border-color: #e63946; color: #e63946; }
        .progress-bar { width: 100%; height: 28px; background: #0d0d20; border-radius: 14px; overflow: hidden; margin: 12px 0; border: 1px solid #2a2a4a; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e63946, #ff6b6b); transition: width 0.5s; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; min-width: 40px; }
        #log { background: #0d0d20; color: #4caf50; padding: 16px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 300px; overflow-y: auto; direction: ltr; text-align: left; border: 1px solid #2a2a4a; line-height: 1.6; }
        .log-error { color: #f44336 !important; }
        .log-success { color: #4caf50 !important; }
        .log-info { color: #2196f3 !important; }
        .log-warn { color: #ff9800 !important; }
        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 40px; color: #555; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .delete-status { margin-right: 8px; font-size: 13px; }
        @media (max-width: 600px) { .container { padding: 12px; } .card { padding: 16px; } .stats-row { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📤 <span>easyT</span> - رفع دروس الكورسات</h1>
    <p class="subtitle">ارفع ملفات النصوص وهنعملها تقطيع و embeddings تلقائياً</p>

    <!-- Step 1: Select Course -->
    <div class="card">
        <h2><span class="num">١</span> اختيار الكورس</h2>
        <select id="courseSelect" onchange="onCourseChange()">
            <option value="">-- اختر الكورس --</option>
        </select>
        <div id="courseInfo" class="hidden">
            <div class="stats-row">
                <div class="stat-badge">📚 الكورس: <b id="selectedCourseName"></b></div>
                <div class="stat-badge">📦 Chunks موجودة: <b id="existingChunks">0</b></div>
            </div>
            <div style="margin-top:12px">
                <button class="btn-danger" onclick="deleteChunks()" id="deleteBtn">🗑️ مسح chunks القديمة لهذا الكورس</button>
                <span class="delete-status" id="deleteStatus"></span>
            </div>
        </div>
    </div>

    <!-- Step 2: Add Lessons -->
    <div class="card">
        <h2><span class="num">٢</span> إضافة الدروس</h2>
        <div id="lessonsList" class="lessons-list">
            <div class="empty-state" id="emptyState">
                <div class="icon">📝</div>
                <p>اضغط "إضافة درس" لبدء إضافة الدروس</p>
            </div>
        </div>
        <button class="add-lesson-btn" onclick="addLesson()">➕ إضافة درس</button>
    </div>

    <!-- Step 3: Process -->
    <div class="card">
        <h2><span class="num">٣</span> رفع ومعالجة</h2>
        <div class="flex-between" style="margin-bottom:12px">
            <div>
                <label>رقم أول درس:</label>
                <input type="number" id="startLessonNum" value="1" min="1" style="width:100px">
            </div>
            <div class="stats-row" id="processStats" style="display:none">
                <div class="stat-badge">✅ نجح: <b id="statSuccess">0</b></div>
                <div class="stat-badge">❌ فشل: <b id="statFailed">0</b></div>
                <div class="stat-badge">📦 Chunks: <b id="statChunks">0</b></div>
            </div>
        </div>

        <button class="btn-primary" id="processBtn" onclick="startProcessing()" disabled>🚀 ابدأ المعالجة</button>
        <button class="btn-success hidden" id="resetBtn" onclick="location.reload()">🔄 ابدأ من جديد</button>

        <div class="progress-bar hidden" id="progressBar">
            <div class="progress-fill" id="progressFill" style="width:0%">0%</div>
        </div>
    </div>

    <!-- Log -->
    <div class="card">
        <h2>📋 سجل العمليات</h2>
        <div id="log"><span class="log-success">🟢 جاهز...</span></div>
    </div>
</div>

<script>
let lessons = [];
let lessonCounter = 0;
let selectedCourseId = '';
let selectedCourseName = '';
let adminToken = '';

// ═══ Login (auto - get token) ═══
async function getAdminToken() {
    // Try to get token - for now use prompt
    const saved = localStorage.getItem('easyt_admin_token');
    if (saved) {
        adminToken = saved;
        return;
    }
    
    const password = prompt('🔐 ادخل كلمة سر الأدمن:');
    if (!password) return;
    
    try {
        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success && data.token) {
            adminToken = data.token;
            localStorage.setItem('easyt_admin_token', data.token);
            log('🔓 تم تسجيل الدخول بنجاح', 'success');
        } else {
            alert('❌ كلمة السر غلط!');
        }
    } catch (err) {
        log('❌ خطأ في تسجيل الدخول: ' + err.message, 'error');
    }
}

// ═══ Load Courses ═══
async function loadCourses() {
    try {
        const res = await fetch('/api/upload/courses');
        const data = await res.json();
        
        if (!data.success || !data.courses) {
            log('❌ فشل تحميل الكورسات', 'error');
            return;
        }
        
        const select = document.getElementById('courseSelect');
        data.courses.forEach(course => {
            const option = document.createElement('option');
            option.value = course.id;
            option.textContent = course.name;
            select.appendChild(option);
        });
        
        log(`📚 تم تحميل ${data.courses.length} كورس`, 'info');
    } catch (err) {
        log('❌ خطأ في تحميل الكورسات: ' + err.message, 'error');
    }
}

// ═══ Course Change ═══
async function onCourseChange() {
    const select = document.getElementById('courseSelect');
    selectedCourseId = select.value;
    selectedCourseName = select.options[select.selectedIndex].text;
    
    const info = document.getElementById('courseInfo');
    
    if (!selectedCourseId) {
        info.classList.add('hidden');
        updateProcessBtn();
        return;
    }
    
    info.classList.remove('hidden');
    document.getElementById('selectedCourseName').textContent = selectedCourseName;
    
    // Get chunk count
    try {
        const res = await fetch(`/api/upload/courses/${selectedCourseId}/chunks-count`);
        const data = await res.json();
        document.getElementById('existingChunks').textContent = data.count || 0;
    } catch (err) {
        document.getElementById('existingChunks').textContent = '?';
    }
    
    updateProcessBtn();
    log(`📚 تم اختيار كورس: ${selectedCourseName}`, 'info');
}

// ═══ Delete Chunks ═══
async function deleteChunks() {
    if (!selectedCourseId) return;
    if (!confirm(`⚠️ هتمسح كل الـ chunks القديمة لكورس "${selectedCourseName}"؟`)) return;
    
    if (!adminToken) await getAdminToken();
    if (!adminToken) return;
    
    const statusEl = document.getElementById('deleteStatus');
    statusEl.textContent = '⏳ جاري المسح...';
    statusEl.style.color = '#ff9800';
    
    try {
        const res = await fetch(`/api/admin/courses/${selectedCourseId}/chunks`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
            statusEl.textContent = `✅ تم مسح ${data.deleted} chunk`;
            statusEl.style.color = '#4caf50';
            document.getElementById('existingChunks').textContent = '0';
            log(`🗑️ تم مسح ${data.deleted} chunk لكورس "${selectedCourseName}"`, 'warn');
        } else {
            throw new Error(data.error || 'Unknown error');
        }
    } catch (err) {
        statusEl.textContent = '❌ فشل المسح';
        statusEl.style.color = '#f44336';
        log('❌ خطأ في مسح الـ chunks: ' + err.message, 'error');
    }
}

// ═══ Add/Remove Lessons ═══
function addLesson() {
    lessonCounter++;
    const id = `lesson_${lessonCounter}`;
    
    document.getElementById('emptyState')?.classList.add('hidden');
    
    const div = document.createElement('div');
    div.className = 'lesson-item';
    div.id = id;
    div.innerHTML = `
        <div class="lesson-header">
            <input type="text" placeholder="اسم الدرس (مثل: مقدمة في التصميم)" 
                   class="lesson-name-input" style="flex:1;margin:0 8px 0 0" 
                   oninput="updateProcessBtn()">
            <span class="lesson-status status-pending" id="${id}_status">جاهز</span>
            <button class="remove-btn" onclick="removeLesson('${id}')" title="حذف">✕</button>
        </div>
        <textarea placeholder="الصق محتوى الترانسكريبت هنا...&#10;&#10;مثال:&#10;[00:00 - 00:15] النهارده هنتكلم عن التصميم&#10;[00:15 - 00:30] أول حاجة هنشرح الألوان&#10;&#10;أو ممكن نص عادي بدون timestamps" 
                  class="lesson-transcript" oninput="updateLessonInfo('${id}')"></textarea>
        <div class="lesson-info" id="${id}_info">0 حرف | 0 سطر</div>
    `;
    
    document.getElementById('lessonsList').appendChild(div);
    lessons.push(id);
    updateProcessBtn();
}

function removeLesson(id) {
    document.getElementById(id)?.remove();
    lessons = lessons.filter(l => l !== id);
    if (lessons.length === 0) {
        document.getElementById('emptyState')?.classList.remove('hidden');
    }
    updateProcessBtn();
}

function updateLessonInfo(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const textarea = el.querySelector('.lesson-transcript');
    const info = document.getElementById(`${id}_info`);
    const text = textarea.value;
    const lines = text.split('\n').filter(l => l.trim()).length;
    const timestampLines = (text.match(/\[\d{2}:\d{2}\s*-\s*\d{2}:\d{2}\]/g) || []).length;
    info.textContent = `${text.length} حرف | ${lines} سطر | ${timestampLines} timestamps`;
    updateProcessBtn();
}

// ═══ Process Button State ═══
function updateProcessBtn() {
    const btn = document.getElementById('processBtn');
    const hasValidLesson = lessons.some(id => {
        const el = document.getElementById(id);
        if (!el) return false;
        const name = el.querySelector('.lesson-name-input').value.trim();
        const transcript = el.querySelector('.lesson-transcript').value.trim();
        return name && transcript;
    });
    btn.disabled = !selectedCourseId || !hasValidLesson;
}

// ═══ Start Processing ═══
async function startProcessing() {
    if (!selectedCourseId) return alert('اختار كورس الأول!');
    if (!adminToken) await getAdminToken();
    if (!adminToken) return;
    
    const validLessons = [];
    for (const id of lessons) {
        const el = document.getElementById(id);
        if (!el) continue;
        const name = el.querySelector('.lesson-name-input').value.trim();
        const transcript = el.querySelector('.lesson-transcript').value.trim();
        if (name && transcript) {
            validLessons.push({ id, name, transcript });
        }
    }
    
    if (validLessons.length === 0) return alert('أضف درس واحد على الأقل!');
    
    const startNum = parseInt(document.getElementById('startLessonNum').value) || 1;
    
    // UI updates
    document.getElementById('processBtn').disabled = true;
    document.getElementById('processBtn').textContent = '⏳ جاري المعالجة...';
    document.getElementById('progressBar').classList.remove('hidden');
    document.getElementById('processStats').style.display = 'flex';
    
    let success = 0, failed = 0, totalChunks = 0;
    
    log(`\n🚀 بدء معالجة ${validLessons.length} درس لكورس "${selectedCourseName}"`, 'info');
    
    for (let i = 0; i < validLessons.length; i++) {
        const lesson = validLessons[i];
        const lessonNum = startNum + i;
        const statusEl = document.getElementById(`${lesson.id}_status`);
        
        // Update progress
        const pct = Math.round(((i) / validLessons.length) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressFill').textContent = pct + '%';
        
        // Set processing status
        statusEl.className = 'lesson-status status-processing';
        statusEl.textContent = '⏳ جاري...';
        
        log(`\n📖 [${i+1}/${validLessons.length}] معالجة: "${lesson.name}" (درس #${lessonNum})`, 'info');
        
        try {
            const res = await fetch('/api/admin/process-lesson', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${adminToken}`
                },
                body: JSON.stringify({
                    courseId: selectedCourseId,
                    lessonNumber: lessonNum,
                    lessonName: lesson.name,
                    transcript: lesson.transcript
                })
            });
            
            const data = await res.json();
            
            if (data.success) {
                success++;
                totalChunks += data.chunksCreated || 0;
                statusEl.className = 'lesson-status status-done';
                statusEl.textContent = `✅ ${data.chunksCreated} chunks`;
                log(`   ✅ نجح! ${data.chunksCreated} chunks تم إنشاؤها`, 'success');
            } else {
                throw new Error(data.error || 'Unknown error');
            }
        } catch (err) {
            failed++;
            statusEl.className = 'lesson-status status-error';
            statusEl.textContent = '❌ فشل';
            log(`   ❌ فشل: ${err.message}`, 'error');
        }
        
        // Update stats
        document.getElementById('statSuccess').textContent = success;
        document.getElementById('statFailed').textContent = failed;
        document.getElementById('statChunks').textContent = totalChunks;
    }
    
    // Done!
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressFill').textContent = '100%';
    document.getElementById('processBtn').classList.add('hidden');
    document.getElementById('resetBtn').classList.remove('hidden');
    
    log(`\n${'═'.repeat(50)}`, 'info');
    log(`🎉 انتهى! نجح: ${success} | فشل: ${failed} | إجمالي chunks: ${totalChunks}`, success > 0 ? 'success' : 'error');
    
    // Refresh chunk count
    onCourseChange();
}

// ═══ Logger ═══
function log(msg, type = '') {
    const el = document.getElementById('log');
    const span = document.createElement('span');
    span.className = type ? `log-${type}` : '';
    span.textContent = msg + '\n';
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
}

// ═══ Init ═══
window.addEventListener('DOMContentLoaded', () => {
    loadCourses();
    getAdminToken();
});
</script>
</body>
</html>
