<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Ziko Bot v10.4 — Ultimate Test Suite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e63946, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #a0a0c0; font-size: 1.1em; }
        .header .version-badge {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(230,57,70,0.2);
            border: 1px solid rgba(230,57,70,0.4);
            border-radius: 20px;
            font-size: 13px;
            color: #ff6b6b;
            margin-top: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-run-all {
            background: linear-gradient(135deg, #e63946, #ff6b6b);
            color: #fff;
            font-size: 15px !important;
            padding: 13px 30px !important;
        }
        .btn-run-all:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(230,57,70,0.4); }
        .btn-category {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }
        .btn-category:hover { background: rgba(255,255,255,0.2); }
        .btn-category.active { background: #e63946; border-color: #e63946 !important; }
        .btn-clear {
            background: rgba(255,100,100,0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255,100,100,0.3) !important;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .stat-item {
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
        }
        .stat-total { background: rgba(100,100,255,0.2); color: #8888ff; }
        .stat-pass { background: rgba(100,255,100,0.2); color: #66ff66; }
        .stat-fail { background: rgba(255,100,100,0.2); color: #ff6666; }
        .stat-warn { background: rgba(255,200,50,0.2); color: #ffcc33; }
        .stat-running { background: rgba(100,200,255,0.2); color: #66ccff; }
        .stat-time { background: rgba(200,100,255,0.2); color: #cc66ff; }
        .stat-avg { background: rgba(100,255,200,0.2); color: #66ffcc; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e63946, #ff6b6b);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .test-group {
            margin-bottom: 20px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .group-header {
            padding: 12px 18px;
            background: rgba(255,255,255,0.06);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .group-header:hover { background: rgba(255,255,255,0.1); }
        .group-header .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .group-body { padding: 0; }
        .group-body.collapsed { display: none; }

        .test-card {
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .test-card:last-child { border-bottom: none; }
        .test-card:hover { background: rgba(255,255,255,0.03); }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .test-msg {
            font-weight: 600;
            font-size: 13px;
            color: #e0e0ff;
        }
        .test-status {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }
        .status-pending { background: rgba(150,150,150,0.3); color: #aaa; }
        .status-running { background: rgba(100,200,255,0.3); color: #66ccff; }
        .status-pass { background: rgba(100,255,100,0.3); color: #66ff66; }
        .status-fail { background: rgba(255,100,100,0.3); color: #ff6666; }
        .status-warn { background: rgba(255,200,50,0.3); color: #ffcc33; }

        .test-expect {
            font-size: 11px;
            color: #888;
            margin-bottom: 3px;
        }
        .test-detail {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            word-break: break-word;
            line-height: 1.6;
        }
        .test-detail.show { display: block; }
        .test-time { font-size: 10px; color: #666; }

        .toggle-detail {
            font-size: 10px;
            color: #e63946;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 3px;
            display: inline-block;
        }

        .server-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .server-input input {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            width: 400px;
            text-align: center;
        }
        .server-input input::placeholder { color: #666; }
        .server-status {
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
            color: #888;
        }
        .server-status.ok { color: #66ff66; }
        .server-status.err { color: #ff6666; }

        .summary-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .summary-box.show { display: block; }
        .summary-box h3 { margin-bottom: 12px; color: #ff6b6b; }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .running { animation: pulse 1s infinite; }
    </style>
</head>
<body>

<div class="header">
    <h1>🧪 Ziko Bot — Ultimate Test Suite</h1>
    <p>اختبار شامل: بحث ذكي + Semantic Search + لهجات + دبلومات + اشتراك + متابعة + مصطلحات + أداء</p>
    <div class="version-badge">v10.4 + Semantic Embeddings</div>
</div>

<div class="server-input">
    <input type="text" id="serverUrl" placeholder="Server URL (auto-detect)" value="">
</div>
<div class="server-status" id="serverStatus">🔍 جاري الكشف عن السيرفر...</div>

<div class="controls">
    <button class="btn-run-all" onclick="runAllTests()">🚀 تشغيل كل الاختبارات</button>
    <button class="btn-category" onclick="runCategory('health')">🏥 صحة</button>
    <button class="btn-category" onclick="runCategory('search')">🔍 بحث</button>
    <button class="btn-category" onclick="runCategory('semantic')">🧠 ذكي</button>
    <button class="btn-category" onclick="runCategory('dialect')">🌍 لهجات</button>
    <button class="btn-category" onclick="runCategory('subscription')">💰 اشتراك</button>
    <button class="btn-category" onclick="runCategory('diplomas')">🎓 دبلومات</button>
    <button class="btn-category" onclick="runCategory('categories')">📂 تصنيفات</button>
    <button class="btn-category" onclick="runCategory('chat')">💬 دردشة</button>
    <button class="btn-category" onclick="runCategory('acronyms')">🔤 مصطلحات</button>
    <button class="btn-category" onclick="runCategory('followup')">🔄 متابعة</button>
    <button class="btn-category" onclick="runCategory('format')">🎨 تنسيق</button>
    <button class="btn-category" onclick="runCategory('typo')">✏️ إملاء</button>
    <button class="btn-category" onclick="runCategory('english')">🌐 English</button>
    <button class="btn-category" onclick="runCategory('edge')">⚡ خاصة</button>
    <button class="btn-clear" onclick="clearResults()">🗑️ مسح</button>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat-item stat-total">📊 الكل: <span id="statTotal">0</span></div>
    <div class="stat-item stat-pass">✅ نجح: <span id="statPass">0</span></div>
    <div class="stat-item stat-fail">❌ فشل: <span id="statFail">0</span></div>
    <div class="stat-item stat-warn">⚠️ تحذير: <span id="statWarn">0</span></div>
    <div class="stat-item stat-running">⏳ جاري: <span id="statRunning">0</span></div>
    <div class="stat-item stat-time">⏱️ إجمالي: <span id="statTime">0s</span></div>
    <div class="stat-item stat-avg">📈 متوسط: <span id="statAvg">0ms</span></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div id="testContainer"></div>
<div class="summary-box" id="summaryBox">
    <h3>📊 ملخص النتائج</h3>
    <div id="summaryContent"></div>
</div>

<script>
const API_BASE = () => {
    const input = document.getElementById('serverUrl').value.trim();
    return input || (window.location.origin.includes('localhost')
        ? 'http://localhost:3000'
        : window.location.origin);
};

const SESSION_PREFIX = 'test_v104_' + Date.now() + '_';
let sessionCounter = 0;
function newSession() { return SESSION_PREFIX + (++sessionCounter); }

let allResponseTimes = [];

// ═══════════════════════════════════════
// HELPER VALIDATORS
// ═══════════════════════════════════════
const V = {
    hasCard: r => /<div.*?style[^>]*border/i.test(r),
    hasCourseCard: r => /📘/.test(r) && /<div.*?style[^>]*border/i.test(r),
    hasDiplomaCard: r => /🎓/.test(r) && /<div.*?style[^>]*border:2px/i.test(r),
    hasLink: r => /<a\s+href/i.test(r),
    hasPrice: r => /💰/.test(r),
    hasBr: r => /<br/i.test(r),
    noRawNewline: r => !/(?<!<br\s*\/?)[\n]/.test(r.replace(/<[^>]*>/g,'')),
    wordIn: (r, words) => words.some(w => new RegExp(w, 'i').test(r)),
    countCards: r => (r.match(/📘/g) || []).length,
    hasSubscriptionLink: r => /subscriptions/i.test(r),
    hasPaymentMethods: r => /visa|فودافون|paypal/i.test(r),
    isDiplomaList: r => /الدبلومات المتاحة/i.test(r) || (/دبلوم/i.test(r) && /1\.|2\./i.test(r)),
    isCategoryList: r => /التصنيفات المتاحة/i.test(r),
    responseLength: r => r ? r.length : 0,
};

// ═══════════════════════════════════════
// TEST DEFINITIONS
// ═══════════════════════════════════════

const TEST_GROUPS = [

    // ═══ 0. HEALTH CHECK ═══
    {
        name: "🏥 صحة السيرفر والاتصال",
        category: "health",
        tests: [
            {
                msg: "__HEALTH__",
                expect: "GET /health — السيرفر شغال",
                isSpecial: true,
                run: async () => {
                    const resp = await fetch(API_BASE() + '/health');
                    const data = await resp.json();
                    const ok = data.status === 'ok' && data.database === 'connected' && data.openai === 'ready';
                    return {
                        reply: JSON.stringify(data, null, 2),
                        pass: ok,
                        detail: `status=${data.status}, db=${data.database}, openai=${data.openai}, version=${data.version}`
                    };
                }
            },
            {
                msg: "__DEBUG__",
                expect: "GET /admin/debug — جداول + embeddings",
                isSpecial: true,
                run: async () => {
                    const resp = await fetch(API_BASE() + '/admin/debug');
                    const data = await resp.json();
                    const hasTables = data.tables && Object.keys(data.tables).length > 0;
                    const coursesOk = data.tables?.courses?.includes('✅');
                    const diplomasOk = data.tables?.diplomas?.includes('✅');
                    return {
                        reply: JSON.stringify(data.tables, null, 2),
                        pass: hasTables && coursesOk && diplomasOk,
                        detail: `tables=${Object.keys(data.tables||{}).length}, courses=${data.tables?.courses}, diplomas=${data.tables?.diplomas}, cache=${data.search_cache_entries}`
                    };
                }
            },
            {
                msg: "__GUIDE_HEALTH__",
                expect: "GET /api/guide/health — Guide Bot شغال",
                isSpecial: true,
                run: async () => {
                    const resp = await fetch(API_BASE() + '/api/guide/health');
                    const data = await resp.json();
                    const ok = data.status === 'ok';
                    return {
                        reply: JSON.stringify(data, null, 2),
                        pass: ok,
                        detail: `status=${data.status}, model=${data.model}, daily_limit=${data.daily_limit}`
                    };
                }
            },
        ]
    },

    // ═══ 1. SEARCH — KEYWORD ═══
    {
        name: "🔍 بحث بالكلمات المفتاحية",
        category: "search",
        tests: [
            {
                msg: "عايز اتعلم فوتوشوب",
                expect: "كورسات فوتوشوب + كاردات",
                validate: r => {
                    const has = V.wordIn(r, ['فوتوشوب','photoshop']);
                    const cards = V.hasCard(r);
                    const count = V.countCards(r);
                    return { pass: has && cards, detail: `فوتوشوب: ${has}, كاردات: ${cards} (${count} كارد)` };
                }
            },
            {
                msg: "كورسات برمجة",
                expect: "كورسات برمجة متنوعة",
                validate: r => {
                    const has = V.wordIn(r, ['برمج','program','python','javascript','coding','بايثون','جافا']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `برمجة: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "ريفيت",
                expect: "كورسات ريفيت/هندسية",
                validate: r => {
                    const has = V.wordIn(r, ['ريفيت','ريفت','revit','هندس']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `ريفيت: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "عايز اتعلم اكسل",
                expect: "كورسات اكسل",
                validate: r => {
                    const has = V.wordIn(r, ['اكسل','excel']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `اكسل: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "ماركتنج",
                expect: "كورسات تسويق/ماركيتنج",
                validate: r => {
                    const has = V.wordIn(r, ['ماركيتنج','تسويق','market','اعلان']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `تسويق: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "كورس ذكاء اصطناعي",
                expect: "كورسات AI",
                validate: r => {
                    const has = V.wordIn(r, ['ذكاء','ai','artificial','اصطناع']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `AI: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "مونتاج",
                expect: "كورسات مونتاج/فيديو",
                validate: r => {
                    const has = V.wordIn(r, ['مونتاج','premiere','بريمير','فيديو','video','افتر']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `مونتاج: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "كورس انجليزي",
                expect: "كورسات لغة انجليزية",
                validate: r => {
                    const has = V.wordIn(r, ['انجليزي','english','لغ','ielts','toefl']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `انجليزي: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "عايز اتعلم كانفا",
                expect: "كورسات كانفا/تصميم",
                validate: r => {
                    const has = V.wordIn(r, ['كانفا','canva','تصميم']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `كانفا: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "بوربوينت",
                expect: "كورسات بوربوينت",
                validate: r => {
                    const has = V.wordIn(r, ['بوربوينت','powerpoint','بور بوينت']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `بوربوينت: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "دبلومة جرافيك",
                expect: "SEARCH (مش DIPLOMAS) — مجال محدد",
                validate: r => {
                    const hasGraphic = V.wordIn(r, ['جرافيك','graphic','تصميم']);
                    const cards = V.hasCard(r);
                    const notFullList = !V.isDiplomaList(r);
                    return { pass: hasGraphic && cards && notFullList, detail: `جرافيك: ${hasGraphic}, كاردات: ${cards}, مش قائمة دبلومات: ${notFullList}` };
                }
            },
        ]
    },

    // ═══ 2. SEMANTIC SEARCH (NEW!) ═══
    {
        name: "🧠 بحث ذكي Semantic Search",
        category: "semantic",
        tests: [
            {
                msg: "عايز اتعلم تعديل الصور",
                expect: "🧠 Semantic → فوتوشوب/تصميم (مش كلمة مباشرة)",
                validate: r => {
                    const has = V.wordIn(r, ['فوتوشوب','photoshop','تصميم','صور','لايتروم','lightroom','تعديل']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `تعديل صور: ${has}, كاردات: ${cards}`, warn: has && !cards };
                }
            },
            {
                msg: "ازاي اعمل فيديوهات احترافية",
                expect: "🧠 Semantic → مونتاج/بريمير/افتر افكتس",
                validate: r => {
                    const has = V.wordIn(r, ['مونتاج','premiere','بريمير','افتر','after','فيديو','video','تصوير']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `فيديو: ${has}, كاردات: ${cards}`, warn: has && !cards };
                }
            },
            {
                msg: "عايز اشتغل في مجال الويب",
                expect: "🧠 Semantic → تطوير مواقع/برمجة",
                validate: r => {
                    const has = V.wordIn(r, ['موقع','ويب','web','html','css','javascript','react','برمج','تطوير','wordpress','ووردبريس']);
                    const cards = V.hasCard(r);
                    return { pass: has, detail: `ويب: ${has}, كاردات: ${cards}`, warn: has && !cards };
                }
            },
            {
                msg: "محتاج اتعلم تصميم شعارات",
                expect: "🧠 Semantic → اليستريتر/جرافيك/فوتوشوب",
                validate: r => {
                    const has = V.wordIn(r, ['شعار','logo','اليستريتر','illustrator','جرافيك','فوتوشوب','تصميم']);
                    const cards = V.hasCard(r);
                    return { pass: has, detail: `شعارات: ${has}, كاردات: ${cards}`, warn: has && !cards };
                }
            },
            {
                msg: "ازاي اعمل اعلانات على الفيسبوك",
                expect: "🧠 Semantic → ديجيتال ماركيتنج/اعلانات",
                validate: r => {
                    const has = V.wordIn(r, ['اعلان','فيسبوك','facebook','ماركيتنج','تسويق','ads','ديجيتال']);
                    const cards = V.hasCard(r);
                    return { pass: has && cards, detail: `اعلانات: ${has}, كاردات: ${cards}` };
                }
            },
            {
                msg: "عايز ابقى محترف في التصميم ثلاثي الأبعاد",
                expect: "🧠 Semantic → 3ds max/blender/lumion",
                validate: r => {
                    const has = V.wordIn(r, ['3d','ثلاثي','بلندر','blender','3ds','max','لوميون','lumion','سكتش','sketchup','ثري دي']);
                    const cards = V.hasCard(r);
                    return { pass: has, detail: `3D: ${has}, كاردات: ${cards}`, warn: has && !cards };
                }
            },
            {
                msg: "ازاي احمي نفسي من الاختراق",
                expect: "🧠 Semantic → كورسات حماية/سيبر سيكيوريتي",
                validate: r => {
                    const has = V.wordIn(r, ['حماي','اختراق','سيبر','cyber','security','hack','كالي','حمايه']);
                    const cards = V.hasCard(r);
                    return { pass: has, detail: `حماية: ${has}, كاردات: ${cards}`, warn: has && !cards };
                }

// ═══════════════════════════════════════
// TEST RUNNER ENGINE
// ═══════════════════════════════════════

let stats = { total: 0, pass: 0, fail: 0, warn: 0, running: 0 };
let startTime = 0;
let groupTimings = {};

function updateStats() {
    document.getElementById('statTotal').textContent = stats.total;
    document.getElementById('statPass').textContent = stats.pass;
    document.getElementById('statFail').textContent = stats.fail;
    document.getElementById('statWarn').textContent = stats.warn;
    document.getElementById('statRunning').textContent = stats.running;
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById('statTime').textContent = elapsed + 's';
    const avgMs = allResponseTimes.length > 0 ? Math.round(allResponseTimes.reduce((a,b)=>a+b,0)/allResponseTimes.length) : 0;
    document.getElementById('statAvg').textContent = avgMs + 'ms';
    const done = stats.pass + stats.fail + stats.warn;
    const pct = stats.total > 0 ? (done / stats.total) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

function renderTestGroups(groups) {
    const container = document.getElementById('testContainer');
    container.innerHTML = '';
    groups.forEach((group, gi) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'test-group';
        groupDiv.id = `group-${gi}`;
        const headerDiv = document.createElement('div');
        headerDiv.className = 'group-header';
        headerDiv.innerHTML = `
            <span>${group.name} (${group.tests.length} اختبار)</span>
            <span class="badge" style="background:rgba(255,255,255,0.15)" id="group-badge-${gi}">⏳</span>
        `;
        headerDiv.onclick = () => {
            document.getElementById(`group-body-${gi}`).classList.toggle('collapsed');
        };
        const bodyDiv = document.createElement('div');
        bodyDiv.className = 'group-body';
        bodyDiv.id = `group-body-${gi}`;
        group.tests.forEach((test, ti) => {
            const card = document.createElement('div');
            card.className = 'test-card';
            card.id = `test-${gi}-${ti}`;
            card.innerHTML = `
                <div class="test-header">
                    <span class="test-msg">"${test.msg.length > 60 ? test.msg.substring(0,60)+'...' : test.msg}"</span>
                    <span class="test-status status-pending" id="status-${gi}-${ti}">⏳</span>
                </div>
                <div class="test-expect">📋 ${test.expect}</div>
                <div class="test-time" id="time-${gi}-${ti}"></div>
                <span class="toggle-detail" onclick="toggleDetail(${gi},${ti})">📄 تفاصيل</span>
                <div class="test-detail" id="detail-${gi}-${ti}"></div>
            `;
            bodyDiv.appendChild(card);
        });
        groupDiv.appendChild(headerDiv);
        groupDiv.appendChild(bodyDiv);
        container.appendChild(groupDiv);
    });
}

function toggleDetail(gi, ti) {
    document.getElementById(`detail-${gi}-${ti}`).classList.toggle('show');
}

async function sendMessage(msg, sessionId) {
    const resp = await fetch(API_BASE() + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: sessionId })
    });
    const data = await resp.json();
    return data.reply || '';
}

async function runTest(gi, ti, test) {
    const statusEl = document.getElementById(`status-${gi}-${ti}`);
    const detailEl = document.getElementById(`detail-${gi}-${ti}`);
    const timeEl = document.getElementById(`time-${gi}-${ti}`);
    statusEl.className = 'test-status status-running';
    statusEl.textContent = '⏳ جاري...';
    stats.running++;
    updateStats();

    const t0 = Date.now();
    try {
        if (test.delay) await new Promise(r => setTimeout(r, test.delay));

        let reply, result;

        if (test.isSpecial && test.run) {
            const res = await test.run();
            reply = res.reply || '';
            result = { pass: res.pass, detail: res.detail, warn: res.warn };
        } else {
            const session = test.session || newSession();
            const msgToSend = test.sendEmpty ? '' : test.msg;
            reply = await sendMessage(msgToSend, session);
            result = test.validate(reply);
        }

        const elapsed = Date.now() - t0;
        allResponseTimes.push(elapsed);
        timeEl.textContent = `⏱️ ${elapsed}ms` + (elapsed > 5000 ? ' ⚠️ بطيء' : elapsed > 3000 ? ' 🟡' : ' ✅');

        const cleanReply = reply.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').substring(0, 400);
        detailEl.innerHTML = `<strong>✅ النتيجة:</strong> ${result.detail}<br><br><strong>📝 الرد (${reply.length} حرف):</strong><br>${cleanReply}`;

        stats.running--;
        if (result.pass) {
            if (result.warn) {
                statusEl.className = 'test-status status-warn';
                statusEl.textContent = '⚠️ جزئي';
                stats.warn++;
            } else {
                statusEl.className = 'test-status status-pass';
                statusEl.textContent = `✅ ${elapsed}ms`;
                stats.pass++;
            }
        } else {
            statusEl.className = 'test-status status-fail';
            statusEl.textContent = '❌ فشل';
            stats.fail++;
            detailEl.classList.add('show'); // Auto-show failed tests
        }
    } catch (err) {
        const elapsed = Date.now() - t0;
        timeEl.textContent = `⏱️ ${elapsed}ms`;
        detailEl.innerHTML = `<strong>❌ خطأ:</strong> ${err.message}`;
        detailEl.classList.add('show');
        statusEl.className = 'test-status status-fail';
        statusEl.textContent = '❌ خطأ';
        stats.running--;
        stats.fail++;
    }
    updateStats();
    updateGroupBadge(gi);
}

function updateGroupBadge(gi) {
    const groups = currentGroups || TEST_GROUPS;
    const group = groups[gi];
    if (!group) return;
    let pass=0, fail=0, warn=0, running=0;
    group.tests.forEach((_, ti) => {
        const el = document.getElementById(`status-${gi}-${ti}`);
        if (!el) return;
        if (el.classList.contains('status-pass')) pass++;
        else if (el.classList.contains('status-fail')) fail++;
        else if (el.classList.contains('status-warn')) warn++;
        else if (el.classList.contains('status-running')) running++;
    });
    const badge = document.getElementById(`group-badge-${gi}`);
    if (!badge) return;
    if (running > 0) { badge.textContent = `⏳ ${running}`; badge.style.background = 'rgba(100,200,255,0.3)'; }
    else if (fail > 0) { badge.textContent = `❌ ${fail} فشل | ✅ ${pass}`; badge.style.background = 'rgba(255,100,100,0.3)'; }
    else if (warn > 0) { badge.textContent = `⚠️ ${warn} | ✅ ${pass}`; badge.style.background = 'rgba(255,200,50,0.3)'; }
    else if (pass === group.tests.length) { badge.textContent = `✅ ${pass}/${pass}`; badge.style.background = 'rgba(100,255,100,0.3)'; }
    else { badge.textContent = `${pass}/${group.tests.length}`; badge.style.background = 'rgba(100,255,100,0.2)'; }
}

let currentGroups = null;

function showSummary() {
    const box = document.getElementById('summaryBox');
    const content = document.getElementById('summaryContent');
    const groups = currentGroups || TEST_GROUPS;
    let html = '';
    groups.forEach((g, gi) => {
        let p=0,f=0,w=0;
        g.tests.forEach((_,ti) => {
            const el = document.getElementById(`status-${gi}-${ti}`);
            if(el?.classList.contains('status-pass')) p++;
            else if(el?.classList.contains('status-fail')) f++;
            else if(el?.classList.contains('status-warn')) w++;
        });
        const icon = f>0?'❌':w>0?'⚠️':'✅';
        html += `<div class="summary-row"><span>${icon} ${g.name}</span><span>✅${p} ❌${f} ⚠️${w}</span></div>`;
    });
    const avgMs = allResponseTimes.length > 0 ? Math.round(allResponseTimes.reduce((a,b)=>a+b,0)/allResponseTimes.length) : 0;
    const maxMs = allResponseTimes.length > 0 ? Math.max(...allResponseTimes) : 0;
    const minMs = allResponseTimes.length > 0 ? Math.min(...allResponseTimes) : 0;
    html += `<div class="summary-row" style="margin-top:10px;border-top:1px solid rgba(255,255,255,0.15);padding-top:10px">
        <span>📈 أوقات الاستجابة</span><span>متوسط: ${avgMs}ms | أسرع: ${minMs}ms | أبطأ: ${maxMs}ms</span></div>`;
    const pct = stats.total > 0 ? Math.round((stats.pass/stats.total)*100) : 0;
    html += `<div class="summary-row"><span>📊 نسبة النجاح</span><span style="color:${pct>=80?'#66ff66':pct>=50?'#ffcc33':'#ff6666'};font-size:16px;font-weight:700">${pct}%</span></div>`;
    content.innerHTML = html;
    box.classList.add('show');
}

async function runAllTests() {
    stats = { total: 0, pass: 0, fail: 0, warn: 0, running: 0 };
    allResponseTimes = [];
    startTime = Date.now();
    currentGroups = TEST_GROUPS;
    const allTests = [];
    TEST_GROUPS.forEach((group, gi) => {
        group.tests.forEach((test, ti) => {
            allTests.push({ gi, ti, test });
            stats.total++;
        });
    });
    renderTestGroups(TEST_GROUPS);
    updateStats();
    document.getElementById('summaryBox').classList.remove('show');

    // Sequential for follow-up tests, parallel for others
    const followupTests = allTests.filter(t => t.test.session);
    const normalTests = allTests.filter(t => !t.test.session);

    // Run normal tests with concurrency
    const CONCURRENCY = 3;
    let idx = 0;
    async function nextNormal() {
        if (idx >= normalTests.length) return;
        const { gi, ti, test } = normalTests[idx++];
        await runTest(gi, ti, test);
        await nextNormal();
    }
    const workers = [];
    for (let i = 0; i < Math.min(CONCURRENCY, normalTests.length); i++) workers.push(nextNormal());
    await Promise.all(workers);

    // Run follow-up tests sequentially (grouped by session)
    const sessionGroups = {};
    followupTests.forEach(t => {
        if (!sessionGroups[t.test.session]) sessionGroups[t.test.session] = [];
        sessionGroups[t.test.session].push(t);
    });
    for (const [, tests] of Object.entries(sessionGroups)) {
        for (const { gi, ti, test } of tests) {
            await runTest(gi, ti, test);
        }
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById('statTime').textContent = elapsed + 's';
    showSummary();
}

async function runCategory(cat) {
    stats = { total: 0, pass: 0, fail: 0, warn: 0, running: 0 };
    allResponseTimes = [];
    startTime = Date.now();
    const filtered = TEST_GROUPS.filter(g => g.category === cat);
    if (filtered.length === 0) { alert('مفيش اختبارات لـ ' + cat); return; }
    currentGroups = filtered;
    const allTests = [];
    filtered.forEach((group, fgi) => {
        group.tests.forEach((test, ti) => {
            allTests.push({ gi: fgi, ti, test });
            stats.total++;
        });
    });
    renderTestGroups(filtered);
    updateStats();
    document.getElementById('summaryBox').classList.remove('show');

    const followupTests = allTests.filter(t => t.test.session);
    const normalTests = allTests.filter(t => !t.test.session);

    const CONCURRENCY = 3;
    let idx = 0;
    async function nextNormal() {
        if (idx >= normalTests.length) return;
        const item = normalTests[idx++];
        await runTest(item.gi, item.ti, item.test);
        await nextNormal();
    }
    const workers = [];
    for (let i = 0; i < Math.min(CONCURRENCY, normalTests.length); i++) workers.push(nextNormal());
    await Promise.all(workers);

    const sessionGroups = {};
    followupTests.forEach(t => {
        if (!sessionGroups[t.test.session]) sessionGroups[t.test.session] = [];
        sessionGroups[t.test.session].push(t);
    });
    for (const [, tests] of Object.entries(sessionGroups)) {
        for (const { gi, ti, test } of tests) {
            await runTest(gi, ti, test);
        }
    }

    showSummary();
}

function clearResults() {
    stats = { total: 0, pass: 0, fail: 0, warn: 0, running: 0 };
    allResponseTimes = [];
    startTime = 0;
    currentGroups = null;
    document.getElementById('testContainer').innerHTML = '';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('summaryBox').classList.remove('show');
    updateStats();
}

    }

});
