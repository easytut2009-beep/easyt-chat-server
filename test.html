<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Ziko Chatbot v10.3 — Full Test Suite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  
  .header { background: linear-gradient(135deg, #1e293b, #334155); padding: 20px; text-align: center; border-bottom: 2px solid #e63946; }
  .header h1 { font-size: 24px; color: #fff; margin-bottom: 8px; }
  .header p { color: #94a3b8; font-size: 14px; }
  
  .config-bar { background: #1e293b; padding: 12px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #334155; }
  .config-bar label { color: #94a3b8; font-size: 13px; }
  .config-bar input { background: #0f172a; border: 1px solid #475569; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 320px; }
  .config-bar input::placeholder { color: #64748b; }
  
  .controls { background: #1e293b; padding: 12px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #334155; }
  .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
  .btn-run { background: #22c55e; color: #fff; }
  .btn-run:hover { background: #16a34a; }
  .btn-stop { background: #ef4444; color: #fff; }
  .btn-stop:hover { background: #dc2626; }
  .btn-clear { background: #64748b; color: #fff; }
  .btn-clear:hover { background: #475569; }
  .btn-cat { background: #334155; color: #94a3b8; border: 1px solid #475569; }
  .btn-cat:hover, .btn-cat.active { background: #e63946; color: #fff; border-color: #e63946; }
  .btn-custom { background: #8b5cf6; color: #fff; }
  .btn-custom:hover { background: #7c3aed; }
  
  .stats-bar { background: #1e293b; padding: 10px 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #334155; }
  .stat { font-size: 13px; }
  .stat-label { color: #64748b; }
  .stat-value { font-weight: 700; margin-right: 4px; }
  .stat-total { color: #fff; }
  .stat-pass { color: #22c55e; }
  .stat-fail { color: #ef4444; }
  .stat-warn { color: #f59e0b; }
  .stat-skip { color: #64748b; }
  .stat-time { color: #38bdf8; }
  
  .progress-wrap { flex: 1; min-width: 200px; }
  .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); transition: width 0.3s; border-radius: 3px; }
  
  .main { padding: 16px; max-width: 1200px; margin: 0 auto; }
  
  .test-group { margin-bottom: 16px; }
  .group-header { background: #1e293b; padding: 10px 16px; border-radius: 10px 10px 0 0; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .group-header:hover { background: #253348; }
  .group-title { font-size: 15px; font-weight: 700; }
  .group-badge { background: #334155; color: #94a3b8; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
  
  .test-list { border: 1px solid #334155; border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
  .test-item { padding: 10px 16px; border-bottom: 1px solid #1e293b; background: #0f172a; transition: all 0.2s; }
  .test-item:last-child { border-bottom: none; }
  .test-item:hover { background: #162032; }
  .test-item.running { background: #1e293b; border-right: 3px solid #38bdf8; }
  .test-item.passed { border-right: 3px solid #22c55e; }
  .test-item.failed { border-right: 3px solid #ef4444; }
  .test-item.warning { border-right: 3px solid #f59e0b; }
  
  .test-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .test-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
  .test-status { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .status-idle { background: #334155; color: #64748b; }
  .status-running { background: #0c4a6e; color: #38bdf8; }
  .status-pass { background: #14532d; color: #22c55e; }
  .status-fail { background: #7f1d1d; color: #ef4444; }
  .status-warn { background: #713f12; color: #f59e0b; }
  
  .test-msg { font-size: 12px; color: #64748b; margin-bottom: 4px; direction: rtl; }
  .test-msg strong { color: #94a3b8; }
  .test-checks { font-size: 11px; color: #475569; }
  
  .test-result { margin-top: 8px; padding: 8px 12px; background: #1e293b; border-radius: 6px; font-size: 12px; max-height: 200px; overflow-y: auto; display: none; }
  .test-result.show { display: block; }
  .test-result .reply-preview { color: #94a3b8; line-height: 1.6; word-break: break-word; }
  .test-result .check-line { padding: 2px 0; }
  .check-pass { color: #22c55e; }
  .check-fail { color: #ef4444; }
  .test-time { color: #38bdf8; font-size: 11px; }
  
  .custom-test { background: #1e293b; padding: 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid #334155; }
  .custom-test h3 { font-size: 15px; margin-bottom: 10px; color: #fff; }
  .custom-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .custom-input { flex: 1; min-width: 200px; background: #0f172a; border: 1px solid #475569; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  .custom-input::placeholder { color: #64748b; }
  
  .toggle-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 11px; }
  .toggle-btn:hover { color: #94a3b8; }
  
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .running .test-status { animation: pulse 1s infinite; }
  
  .hidden { display: none; }
  
  @media (max-width: 768px) {
    .config-bar input { width: 100%; }
    .controls { justify-content: center; }
    .stats-bar { justify-content: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧪 Ziko Chatbot v10.3 — Full Test Suite</h1>
  <p>اختبار شامل لكل وظائف الشات بوت — 50+ سيناريو</p>
</div>

<div class="config-bar">
  <label>🔗 API URL:</label>
<input type="text" id="apiUrl" ... value="https://easyt-chat-server.onrender.com">
  <button class="btn btn-run" onclick="testConnection()">🔌 اختبر الاتصال</button>
  <span id="connStatus" style="font-size:12px;color:#64748b;">⏳ لم يُختبر</span>
</div>

<div class="controls">
  <button class="btn btn-run" onclick="runAllTests()" id="btnRunAll">🚀 تشغيل الكل</button>
  <button class="btn btn-stop hidden" onclick="stopTests()" id="btnStop">⏹️ إيقاف</button>
  <button class="btn btn-clear" onclick="clearResults()">🗑️ مسح النتائج</button>
  <span style="color:#334155;">|</span>
  <button class="btn btn-cat active" data-cat="all" onclick="filterCat('all',this)">الكل</button>
  <button class="btn btn-cat" data-cat="greeting" onclick="filterCat('greeting',this)">تحيات</button>
  <button class="btn btn-cat" data-cat="search" onclick="filterCat('search',this)">بحث</button>
  <button class="btn btn-cat" data-cat="subscription" onclick="filterCat('subscription',this)">اشتراك</button>
  <button class="btn btn-cat" data-cat="dialect" onclick="filterCat('dialect',this)">لهجات</button>
  <button class="btn btn-cat" data-cat="followup" onclick="filterCat('followup',this)">متابعة</button>
  <button class="btn btn-cat" data-cat="edge" onclick="filterCat('edge',this)">حالات حدية</button>
  <button class="btn btn-cat" data-cat="categories" onclick="filterCat('categories',this)">تصنيفات</button>
  <button class="btn btn-cat" data-cat="spelling" onclick="filterCat('spelling',this)">إملاء</button>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-label">الإجمالي: </span><span class="stat-value stat-total" id="statTotal">0</span></div>
  <div class="stat"><span class="stat-label">نجح: </span><span class="stat-value stat-pass" id="statPass">0</span></div>
  <div class="stat"><span class="stat-label">فشل: </span><span class="stat-value stat-fail" id="statFail">0</span></div>
  <div class="stat"><span class="stat-label">تحذير: </span><span class="stat-value stat-warn" id="statWarn">0</span></div>
  <div class="stat"><span class="stat-label">⏱️ </span><span class="stat-value stat-time" id="statTime">0ms</span></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="main">
  
  <!-- Custom Test -->
  <div class="custom-test">
    <h3>✏️ اختبار يدوي</h3>
    <div class="custom-row">
      <input type="text" class="custom-input" id="customMsg" placeholder="اكتب رسالتك هنا...">
      <input type="text" class="custom-input" id="customCheck" placeholder="كلمة متوقعة في الرد (اختياري)" style="max-width:250px;">
      <button class="btn btn-custom" onclick="runCustomTest()">🧪 اختبر</button>
    </div>
    <div class="test-result" id="customResult"></div>
  </div>

  <div id="testContainer"></div>
</div>

<script>
// ══════════════════════════════════════

const TEST_GROUPS = [

    tests: [

      { msg: "وش طرق الدفع؟", checks: ["contains:دفع|visa|فودافون"], desc: "خليجي — وش طرق الدفع" },
      { msg: "كيف اشترك؟", checks: ["contains:اشتراك|اشترك|subscri"], desc: "خليجي — كيف اشترك" },

    ]
  },
  {
    name: "🌍 اللهجات — شامي",
    cat: "dialect",

  },

    name: "🌍 اللهجات — مغربي",

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let isRunning = false;
let shouldStop = false;
let results = { total: 0, pass: 0, fail: 0, warn: 0, totalTime: 0 };
let sessionIds = {};
let currentFilter = 'all';

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function renderTests() {
  const container = document.getElementById('testContainer');
  container.innerHTML = '';
  
  let testIdx = 0;
  TEST_GROUPS.forEach((group, gIdx) => {
    if (currentFilter !== 'all' && group.cat !== currentFilter) return;
    
    const groupDiv = document.createElement('div');
    groupDiv.className = 'test-group';
    groupDiv.setAttribute('data-cat', group.cat);
    
    let testsHtml = '';
    group.tests.forEach((test, tIdx) => {
      const id = `test-${gIdx}-${tIdx}`;
      const checksStr = test.checks.map(c => {
        if (c === 'has_card') return '📦 يحتوي كارد';
        if (c === 'greeting_tone') return '👋 نبرة ترحيب';
        if (c === 'asks_clarification') return '❓ يطلب توضيح';
        if (c === 'not_empty') return '✍️ رد غير فارغ';
        if (c.startsWith('contains:')) return '🔍 يحتوي: ' + c.replace('contains:', '');
        return c;
      }).join(' | ');
      
      testsHtml += `
        <div class="test-item" id="${id}">
          <div class="test-top">
            <span class="test-name">${test.desc}</span>
            <span class="test-status status-idle" id="${id}-status">⏳ ينتظر</span>
          </div>
          <div class="test-msg"><strong>💬</strong> "${test.msg}"</div>
          <div class="test-checks">🎯 ${checksStr}</div>
          <div class="test-result" id="${id}-result"></div>
          <button class="toggle-btn" id="${id}-toggle" onclick="toggleResult('${id}')" style="display:none;">📋 عرض التفاصيل</button>
        </div>
      `;
      testIdx++;
    });
    
    groupDiv.innerHTML = `
      <div class="group-header" onclick="toggleGroup(this)">
        <span class="group-title">${group.name}</span>
        <span class="group-badge">${group.tests.length} اختبار</span>
      </div>
      <div class="test-list">${testsHtml}</div>
    `;
    
    container.appendChild(groupDiv);
  });
  
  results.total = testIdx;
  document.getElementById('statTotal').textContent = testIdx;
}

function toggleGroup(header) {
  const list = header.nextElementSibling;
  list.style.display = list.style.display === 'none' ? 'block' : 'none';
}

function toggleResult(id) {
  const el = document.getElementById(`${id}-result`);
  el.classList.toggle('show');
  const btn = document.getElementById(`${id}-toggle`);
  btn.textContent = el.classList.contains('show') ? '📋 إخفاء التفاصيل' : '📋 عرض التفاصيل';
}

function filterCat(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTests();
}

// ══════════════════════════════════════
// CHECK FUNCTIONS
// ══════════════════════════════════════
function evaluateChecks(reply, checks) {
  const results = [];
  const replyLower = (reply || '').toLowerCase();
  const replyNorm = replyLower
    .replace(/[أإآٱ]/g, 'ا')
    .replace(/ى/g, 'ي')
    .replace(/ة/g, 'ه')
    .replace(/ؤ/g, 'و')
    .replace(/ئ/g, 'ي');
  
  for (const check of checks) {
    if (check === 'has_card') {
      const has = replyLower.includes('border') && replyLower.includes('div') && 
                  (replyLower.includes('تفاصيل') || replyLower.includes('الدورة') || replyLower.includes('الدبلومة'));
      results.push({ check: '📦 كارد', passed: has, detail: has ? 'يحتوي على كارد ✅' : 'لا يوجد كارد ❌' });
    }
    else if (check === 'greeting_tone') {
      const greetWords = ['اهلا', 'مرحبا', 'هلا', 'اهلاً', 'welcome', 'hi', 'hello', 'سلام', 'وعليكم', 'اقدر', 'ساعد', '😊', '👋', 'اساعد', 'نورت'];
      const has = greetWords.some(w => replyNorm.includes(w));
      results.push({ check: '👋 ترحيب', passed: has, detail: has ? 'نبرة ودودة ✅' : 'لا ترحيب واضح ⚠️' });
    }
    else if (check === 'asks_clarification') {
      const clarifyWords = ['ايه', 'اي', 'تحب', 'تبغ', 'عايز ايه', 'قولي', 'حدد', 'وضح', '؟', 'مجال', 'موضوع', 'تتعلم'];
      const has = clarifyWords.some(w => replyNorm.includes(w));
      results.push({ check: '❓ توضيح', passed: has, detail: has ? 'يطلب توضيح ✅' : 'لم يطلب توضيح ⚠️' });
    }
    else if (check === 'not_empty') {
      const has = (reply || '').trim().length > 10;
      results.push({ check: '✍️ غير فارغ', passed: has, detail: has ? `الرد ${reply.length} حرف ✅` : 'رد فارغ أو قصير جداً ❌' });
    }
    else if (check.startsWith('contains:')) {
      const keywords = check.replace('contains:', '').split('|');
      const found = keywords.filter(kw => replyNorm.includes(kw.toLowerCase()) || replyLower.includes(kw.toLowerCase()));
      const has = found.length > 0;
      results.push({ 
        check: `🔍 ${keywords.join('|')}`, 
        passed: has, 
        detail: has ? `وُجد: ${found.join(', ')} ✅` : `لم يُوجد أي من: ${keywords.join(', ')} ❌` 
      });
    }
  }
  
  return results;
}

// ══════════════════════════════════════
// API CALLS
// ══════════════════════════════════════
async function sendMessage(msg, sessionId) {
  const url = document.getElementById('apiUrl').value.replace(/\/+$/, '');
  const start = Date.now();
  
  const resp = await fetch(`${url}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, session_id: sessionId || 'test_' + Date.now() })
  });
  
  const data = await resp.json();
  const elapsed = Date.now() - start;
  
  return { reply: data.reply || '', elapsed };
}

async function testConnection() {
  const url = document.getElementById('apiUrl').value.replace(/\/+$/, '');
  const status = document.getElementById('connStatus');
  status.textContent = '⏳ جاري الاختبار...';
  status.style.color = '#f59e0b';
  
  try {
    const resp = await fetch(`${url}/health`);
    const data = await resp.json();
    if (data.status === 'ok') {
      status.textContent = `✅ متصل | ${data.version} | DB: ${data.database} | AI: ${data.openai}`;
      status.style.color = '#22c55e';
    } else {
      status.textContent = `⚠️ متصل بمشاكل: ${JSON.stringify(data)}`;
      status.style.color = '#f59e0b';
    }
  } catch (e) {
    status.textContent = `❌ فشل الاتصال: ${e.message}`;
    status.style.color = '#ef4444';
  }
}

// ══════════════════════════════════════
// RUN TESTS
// ══════════════════════════════════════
async function runAllTests() {
  if (isRunning) return;
  isRunning = true;
  shouldStop = false;
  
  document.getElementById('btnRunAll').classList.add('hidden');
  document.getElementById('btnStop').classList.remove('hidden');
  
  results = { total: 0, pass: 0, fail: 0, warn: 0, totalTime: 0 };
  sessionIds = {};
  
  let allTests = [];
  TEST_GROUPS.forEach((group, gIdx) => {
    if (currentFilter !== 'all' && group.cat !== currentFilter) return;
    group.tests.forEach((test, tIdx) => {
      allTests.push({ ...test, gIdx, tIdx, id: `test-${gIdx}-${tIdx}` });
    });
  });
  
  results.total = allTests.length;
  document.getElementById('statTotal').textContent = allTests.length;
  
  const totalStart = Date.now();
  
  for (let i = 0; i < allTests.length; i++) {
    if (shouldStop) break;
    
    const test = allTests[i];
    const el = document.getElementById(test.id);
    const statusEl = document.getElementById(`${test.id}-status`);
    const resultEl = document.getElementById(`${test.id}-result`);
    const toggleEl = document.getElementById(`${test.id}-toggle`);
    
    if (!el) continue;
    
    // Mark running
    el.className = 'test-item running';
    statusEl.className = 'test-status status-running';
    statusEl.textContent = '⏳ جاري...';
    
    // Scroll into view
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    try {
      // Generate session ID for follow-up tests
      let sessionId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      if (test.sessionHint) {
        if (!sessionIds[test.sessionHint]) {
          sessionIds[test.sessionHint] = 'test_followup_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }
        sessionId = sessionIds[test.sessionHint];
      }
      
      const { reply, elapsed } = await sendMessage(test.msg, sessionId);
      results.totalTime += elapsed;
      
      // Evaluate
      const checkResults = evaluateChecks(reply, test.checks);
      const allPassed = checkResults.every(c => c.passed);
      const somePassed = checkResults.some(c => c.passed);
      
      // Determine status
      let finalStatus, cssClass;
      if (allPassed) {
        finalStatus = 'pass';
        cssClass = 'passed';
        results.pass++;
      } else if (somePassed) {
        finalStatus = 'warn';
        cssClass = 'warning';
        results.warn++;
      } else {
        finalStatus = 'fail';
        cssClass = 'failed';
        results.fail++;
      }
      
      el.className = `test-item ${cssClass}`;
      statusEl.className = `test-status status-${finalStatus}`;
      statusEl.textContent = finalStatus === 'pass' ? '✅ نجح' : finalStatus === 'warn' ? '⚠️ جزئي' : '❌ فشل';
      
      // Show result details
      let detailHtml = `<span class="test-time">⏱️ ${elapsed}ms</span><br>`;
      checkResults.forEach(cr => {
        detailHtml += `<div class="check-line ${cr.passed ? 'check-pass' : 'check-fail'}">${cr.passed ? '✅' : '❌'} ${cr.check}: ${cr.detail}</div>`;
      });
      
      // Preview reply (strip heavy HTML)
      let preview = reply.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
                         .replace(/<[^>]*>/g, ' ')
                         .replace(/\s+/g, ' ')
                         .trim();
      if (preview.length > 300) preview = preview.substring(0, 300) + '...';
      detailHtml += `<br><div class="reply-preview">💬 ${preview}</div>`;
      
      resultEl.innerHTML = detailHtml;
      toggleEl.style.display = 'inline-block';
      
      // Auto-show failures
      if (finalStatus === 'fail') {
        resultEl.classList.add('show');
        toggleEl.textContent = '📋 إخفاء التفاصيل';
      }
      
    } catch (e) {
      el.className = 'test-item failed';
      statusEl.className = 'test-status status-fail';
      statusEl.textContent = '❌ خطأ';
      resultEl.innerHTML = `<div class="check-fail">❌ Error: ${e.message}</div>`;
      resultEl.classList.add('show');
      toggleEl.style.display = 'inline-block';
      toggleEl.textContent = '📋 إخفاء التفاصيل';
      results.fail++;
    }
    
    // Update stats
    updateStats();
    
    // Update progress
    const pct = Math.round(((i + 1) / allTests.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    
    // Small delay to avoid rate limiting
    if (i < allTests.length - 1) {
      await new Promise(r => setTimeout(r, 800));
    }
  }
  
  results.totalTime = Date.now() - totalStart;
  updateStats();
  
  isRunning = false;
  document.getElementById('btnRunAll').classList.remove('hidden');
  document.getElementById('btnStop').classList.add('hidden');
}

function stopTests() {
  shouldStop = true;
  document.getElementById('btnStop').textContent = '⏳ جاري الإيقاف...';
}

function updateStats() {
  document.getElementById('statTotal').textContent = results.total;
  document.getElementById('statPass').textContent = results.pass;
  document.getElementById('statFail').textContent = results.fail;
  document.getElementById('statWarn').textContent = results.warn;
  document.getElementById('statTime').textContent = (results.totalTime / 1000).toFixed(1) + 's';
}

function clearResults() {
  results = { total: 0, pass: 0, fail: 0, warn: 0, totalTime: 0 };
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('customResult').innerHTML = '';
  document.getElementById('customResult').classList.remove('show');
  renderTests();
  updateStats();
}

// ══════════════════════════════════════
// CUSTOM TEST
// ══════════════════════════════════════
async function runCustomTest() {
  const msg = document.getElementById('customMsg').value.trim();
  if (!msg) return;
  
  const checkWord = document.getElementById('customCheck').value.trim();
  const resultEl = document.getElementById('customResult');
  
  resultEl.innerHTML = '<span style="color:#38bdf8;">⏳ جاري الإرسال...</span>';
  resultEl.classList.add('show');
  
  try {
    const { reply, elapsed } = await sendMessage(msg);
    
    let html = `<span class="test-time">⏱️ ${elapsed}ms</span><br>`;
    
    if (checkWord) {
      const found = reply.toLowerCase().includes(checkWord.toLowerCase());
      html += `<div class="${found ? 'check-pass' : 'check-fail'}">${found ? '✅' : '❌'} البحث عن "${checkWord}": ${found ? 'موجود' : 'غير موجود'}</div>`;
    }
    
    const hasCard = reply.includes('border') && reply.includes('div') && (reply.includes('تفاصيل') || reply.includes('الدورة'));
    html += `<div class="${hasCard ? 'check-pass' : 'check-fail'}">${hasCard ? '✅' : '❌'} كارد كورس: ${hasCard ? 'موجود' : 'غير موجود'}</div>`;
    html += `<div class="check-pass">✅ طول الرد: ${reply.length} حرف</div>`;
    
    let preview = reply.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
    if (preview.length > 500) preview = preview.substring(0, 500) + '...';
    html += `<br><div class="reply-preview">💬 ${preview}</div>`;
    
    // Show raw HTML option
    html += `<br><button class="toggle-btn" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">🔧 عرض HTML الخام</button>`;
    html += `<pre style="display:none;background:#0f172a;padding:8px;border-radius:4px;overflow-x:auto;font-size:11px;color:#64748b;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;">${reply.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>`;
    
    resultEl.innerHTML = html;
  } catch (e) {
    resultEl.innerHTML = `<div class="check-fail">❌ Error: ${e.message}</div>`;
  }
}

// Allow Enter key for custom test
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('customMsg').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runCustomTest();
  });
});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
renderTests();
</script>
